# Monthly (or on-demand) Federal Register → Firestore sync for U.S. executive orders.
#
# Setup:
#   Repository → Settings → Secrets and variables → Actions → New repository secret:
#     FIREBASE_SERVICE_ACCOUNT_JSON = full JSON from Firebase service account key
#       (Project settings → Service accounts → Generate new private key).
#
# The JSON secret must allow Firestore writes to the same project the web app uses.

name: Sync US executive orders

on:
  schedule:
    # First day of each month, 06:15 UTC (adjust as needed)
    - cron: '15 6 1 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Federal Register → Firestore sync
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Optional overrides (uncomment in repo if needed):
          # PRESIDENT_SLUG: donald-trump
          # PRESIDENT_DISPLAY_NAME: Donald J. Trump
          # MAX_DETAIL_FETCHES: '0'
        run: npm run sync:us-executive-orders
